services:
  postgres:
    image: postgres:16-alpine
    container_name: clinic-track-db
    environment:
      POSTGRES_DB: clinic_track
      POSTGRES_USER: clinic_track
      POSTGRES_PASSWORD: clinic_track
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: