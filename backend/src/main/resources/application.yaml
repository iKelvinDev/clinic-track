spring:
  application:
    name: clinic-track

  config:
    import: optional:file:../.env[.properties]

  datasource:
    url: jdbc:${DATABASE_PUBLIC_URL:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DATABASE:${POSTGRES_DB:clinic_track}}}
    username: ${PG_USER:${POSTGRES_USER:clinic_track}}
    password: ${PG_PASSWORD:${POSTGRES_PASSWORD:clinic_track}}
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format-sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

gemini:
  api-key: ${GEMINI_API_KEY}
  url: https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent